name: Frontend CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'frontend/**'

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install dependencies
      working-directory: ./frontend
      run: npm ci
    
    - name: Run ESLint
      working-directory: ./frontend
      run: npm run lint || true
    
    - name: Run Prettier check
      working-directory: ./frontend
      run: npm run format:check || echo "Prettier not configured"
    
    - name: Run TypeScript type check
      working-directory: ./frontend
      run: npm run type-check || npx tsc --noEmit
    
    - name: Run tests with coverage
      working-directory: ./frontend
      run: npm test -- --coverage --run || echo "Tests not fully configured"
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./frontend/coverage/coverage-final.json
        flags: frontend
        name: frontend-coverage
    
    - name: Build application
      working-directory: ./frontend
      run: npm run build
    
    - name: Check build size
      working-directory: ./frontend
      run: |
        du -sh dist/
        echo "Build size:"
        du -h dist/ | sort -h | tail -20

  security:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Install dependencies
      working-directory: ./frontend
      run: npm ci
    
    - name: Run npm audit
      working-directory: ./frontend
      run: npm audit --audit-level=moderate || true
    
    - name: Check for outdated dependencies
      working-directory: ./frontend
      run: npm outdated || true

  build:
    runs-on: ubuntu-latest
    needs: [test, security]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Docker image
      working-directory: ./frontend
      run: docker build -t nautilus-frontend:test .
    
    - name: Test Docker image
      run: |
        docker run -d --name test-frontend -p 8080:80 nautilus-frontend:test
        sleep 5
        curl -f http://localhost:8080/ || exit 1
        docker stop test-frontend
