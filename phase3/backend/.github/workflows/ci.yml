name: Continuous Integration

on:
  push:
    branches: [ main, develop, feature/** ]
  pull_request:
    branches: [ main, develop ]

env:
  PYTHON_VERSION: '3.13'
  POETRY_VERSION: '1.7.1'

jobs:
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black mypy isort pylint
        pip install -r requirements.txt

    - name: Run Black (Code Formatting)
      run: |
        black --check --diff . || echo "::warning::Black formatting issues found"

    - name: Run isort (Import Sorting)
      run: |
        isort --check-only --diff . || echo "::warning::Import sorting issues found"

    - name: Run Flake8 (Linting)
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run Pylint (Static Analysis)
      run: |
        pylint api/ models/ utils/ --fail-under=8.0 --exit-zero || echo "::warning::Pylint issues found"

    - name: Run Mypy (Type Checking)
      run: |
        mypy api/ models/ utils/ --ignore-missing-imports --no-strict-optional || echo "::warning::Type checking issues found"

  dependency-check:
    name: Dependency Security Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install Safety
      run: |
        pip install safety pip-audit

    - name: Check dependencies with Safety
      run: |
        safety check --json --output safety-report.json || echo "::warning::Dependency vulnerabilities found"

    - name: Check dependencies with pip-audit
      run: |
        pip-audit --requirement requirements.txt --format json --output pip-audit-report.json || echo "::warning::Dependency audit issues found"

    - name: Upload dependency reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: dependency-reports
        path: |
          safety-report.json
          pip-audit-report.json

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nautilus_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-asyncio pytest-xdist

    - name: Run unit tests with coverage
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nautilus_test
        REDIS_URL: redis://localhost:6379
        SECRET_KEY: test-secret-key-for-ci-cd
        API_KEY_PREFIX: nau_
        ENVIRONMENT: test
      run: |
        pytest tests/ \
          -v \
          --cov=api \
          --cov=models \
          --cov=utils \
          --cov-report=xml \
          --cov-report=html \
          --cov-report=term-missing \
          --cov-fail-under=80 \
          -m "not integration and not slow" \
          --maxfail=5 \
          --tb=short

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: htmlcov/
        retention-days: 30

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nautilus_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio

    - name: Run integration tests
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nautilus_test
        REDIS_URL: redis://localhost:6379
        SECRET_KEY: test-secret-key-for-ci-cd
        API_KEY_PREFIX: nau_
        ENVIRONMENT: test
        BLOCKCHAIN_MOCK_MODE: "true"
      run: |
        pytest tests/ \
          -v \
          -m "integration" \
          --tb=short \
          --maxfail=3

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: integration-test-results
        path: test-results/

  build-validation:
    name: Build Validation
    runs-on: ubuntu-latest
    needs: [code-quality, unit-tests]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: false
        tags: nautilus-backend:ci-${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Test Docker image
      run: |
        docker build -t nautilus-backend:test .
        docker run --rm nautilus-backend:test python -c "import main; print('✅ Application imports successfully')"

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [code-quality, dependency-check, unit-tests, integration-tests, build-validation]
    if: always()

    steps:
    - name: Check CI status
      run: |
        echo "## CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Code Quality: ${{ needs.code-quality.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Dependency Check: ${{ needs.dependency-check.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Unit Tests: ${{ needs.unit-tests.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Integration Tests: ${{ needs.integration-tests.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Build Validation: ${{ needs.build-validation.result }}" >> $GITHUB_STEP_SUMMARY

    - name: Fail if any job failed
      if: |
        needs.code-quality.result == 'failure' ||
        needs.unit-tests.result == 'failure' ||
        needs.integration-tests.result == 'failure' ||
        needs.build-validation.result == 'failure'
      run: |
        echo "❌ CI Pipeline failed"
        exit 1
