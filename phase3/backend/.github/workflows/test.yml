name: Test Suite

on:
  push:
    branches: [ main, develop, feature/** ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # 每天凌晨2点运行完整测试套件
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Test type to run'
        required: true
        type: choice
        options:
          - all
          - unit
          - integration
          - e2e
          - performance
          - blockchain

env:
  PYTHON_VERSION: '3.13'

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    if: |
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.test_type == 'all' ||
      github.event.inputs.test_type == 'unit'

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nautilus_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-asyncio pytest-xdist pytest-timeout

    - name: Run unit tests
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nautilus_test
        REDIS_URL: redis://localhost:6379
        SECRET_KEY: test-secret-key
        API_KEY_PREFIX: nau_
        ENVIRONMENT: test
      run: |
        pytest tests/ \
          -v \
          -m "unit" \
          --cov=api \
          --cov=models \
          --cov=utils \
          --cov-report=xml \
          --cov-report=html \
          --cov-report=term-missing \
          --cov-fail-under=85 \
          --maxfail=10 \
          --tb=short \
          --timeout=300 \
          -n auto

    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unit
        name: unit-tests

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: unit-test-results
        path: |
          coverage.xml
          htmlcov/

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    if: |
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.test_type == 'all' ||
      github.event.inputs.test_type == 'integration'

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nautilus_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio pytest-timeout

    - name: Run integration tests
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nautilus_test
        REDIS_URL: redis://localhost:6379
        SECRET_KEY: test-secret-key
        API_KEY_PREFIX: nau_
        ENVIRONMENT: test
        BLOCKCHAIN_MOCK_MODE: "true"
      run: |
        pytest tests/ \
          -v \
          -m "integration" \
          --tb=short \
          --timeout=600 \
          --maxfail=5

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: integration-test-results
        path: test-results/

  e2e-tests:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    if: |
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.test_type == 'all' ||
      github.event.inputs.test_type == 'e2e'

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nautilus_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio

    - name: Start application
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nautilus_test
        REDIS_URL: redis://localhost:6379
        SECRET_KEY: test-secret-key
        API_KEY_PREFIX: nau_
        ENVIRONMENT: test
      run: |
        uvicorn main:app --host 0.0.0.0 --port 8000 &
        sleep 10

    - name: Run E2E tests
      env:
        API_BASE_URL: http://localhost:8000
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nautilus_test
        REDIS_URL: redis://localhost:6379
        SECRET_KEY: test-secret-key
      run: |
        pytest tests/ \
          -v \
          -m "e2e" \
          --tb=short \
          --maxfail=3

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: e2e-test-results
        path: test-results/

  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.test_type == 'all' ||
      github.event.inputs.test_type == 'performance'

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nautilus_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio locust

    - name: Start application
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nautilus_test
        REDIS_URL: redis://localhost:6379
        SECRET_KEY: test-secret-key
        API_KEY_PREFIX: nau_
        ENVIRONMENT: test
      run: |
        uvicorn main:app --host 0.0.0.0 --port 8000 &
        sleep 10

    - name: Run performance tests
      run: |
        pytest tests/ \
          -v \
          -m "performance" \
          --tb=short

    - name: Run load tests with Locust
      run: |
        locust -f locustfile.py \
          --headless \
          --users 100 \
          --spawn-rate 10 \
          --run-time 5m \
          --host http://localhost:8000 \
          --html performance-report.html \
          --csv performance-results

    - name: Upload performance results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: performance-test-results
        path: |
          performance-report.html
          performance-results*.csv

  blockchain-tests:
    name: Blockchain Integration Tests
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.test_type == 'all' ||
      github.event.inputs.test_type == 'blockchain'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio

    - name: Run blockchain tests (Mock mode)
      env:
        DATABASE_URL: sqlite:///test_blockchain.db
        SECRET_KEY: test-secret-key
        BLOCKCHAIN_MOCK_MODE: "true"
      run: |
        pytest tests/test_blockchain*.py \
          -v \
          --tb=short \
          -k "not testnet"

    - name: Run blockchain tests (Testnet)
      if: github.event_name == 'schedule'
      env:
        SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
        INFURA_PROJECT_ID: ${{ secrets.INFURA_PROJECT_ID }}
        BLOCKCHAIN_PRIVATE_KEY: ${{ secrets.TEST_PRIVATE_KEY }}
        TASK_MARKET_ADDRESS: ${{ secrets.TASK_MARKET_ADDRESS }}
        REWARD_POOL_ADDRESS: ${{ secrets.REWARD_POOL_ADDRESS }}
        AGENT_REGISTRY_ADDRESS: ${{ secrets.AGENT_REGISTRY_ADDRESS }}
      run: |
        pytest tests/test_blockchain*.py \
          -v \
          --tb=short \
          -k "testnet" || echo "Testnet tests skipped (secrets not configured)"

    - name: Upload blockchain test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: blockchain-test-results
        path: test-results/

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, e2e-tests, performance-tests, blockchain-tests]
    if: always()

    steps:
    - name: Generate test summary
      run: |
        echo "## Test Suite Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Test Type | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Unit Tests | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Integration Tests | ${{ needs.integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| E2E Tests | ${{ needs.e2e-tests.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Performance Tests | ${{ needs.performance-tests.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Blockchain Tests | ${{ needs.blockchain-tests.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Executed at: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY

    - name: Check overall status
      run: |
        if [ "${{ needs.unit-tests.result }}" == "failure" ] || \
           [ "${{ needs.integration-tests.result }}" == "failure" ]; then
          echo "❌ Critical tests failed"
          exit 1
        fi
        echo "✅ All critical tests passed"
