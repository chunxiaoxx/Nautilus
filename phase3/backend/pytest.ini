# Pytest 配置文件

[pytest]
# 测试文件匹配模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 测试目录
testpaths = tests

# 命令行选项
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# 异步测试支持
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# 标记定义
markers =
    slow: 标记慢速测试
    integration: 标记集成测试
    workflow: 标记工作流测试
    unit: 标记单元测试

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 覆盖率配置（可选）
# [coverage:run]
# source = .
# omit =
#     */tests/*
#     */venv/*
#     */__pycache__/*

# [coverage:report]
# precision = 2
# show_missing = True
