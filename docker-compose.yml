version: "3.8"

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nautilus_production
      POSTGRES_USER: nautilus_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nautilus2024}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  backend:
    build:
      context: ./phase3/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://nautilus_user:${POSTGRES_PASSWORD:-nautilus2024}@db:5432/nautilus_production
      REDIS_URL: redis://redis:6379/0

  frontend:
    build:
      context: ./phase3/website
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
